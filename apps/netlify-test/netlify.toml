[build]
command = "npm run build"
functions = "netlify/functions"
publish = "dist"

[dev]
command = "npm run dev:vite"
targetPort = 3000
port = 8888
autoLaunch = false

[context.production]
environment = { ECOLLECT_ENVIRONMENT = "prod" }

[context.deploy-preview]
environment = { ECOLLECT_ENVIRONMENT = "test" }

[context.branch-deploy]
environment = { ECOLLECT_ENVIRONMENT = "test" }
