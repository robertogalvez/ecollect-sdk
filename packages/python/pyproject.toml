[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ecollect-sdk"
version = "0.1.0a1"
requires-python = ">=3.9"
dependencies = ["httpx>=0.27.0"]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-asyncio>=0.23", "respx>=0.21", "pytest-cov>=5.0"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
